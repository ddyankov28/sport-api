openapi: 3.0.3
info:
  title: Stadiums API
  version: 1.0.0
  description: API to manage stadiums
servers:
  - url: http://localhost:8080
paths:
  /stadiums:
    get:
      summary: Get all stadiums
      operationId: getStadiums
      tags: [Stadiums]
      responses:
        '200':
          description: List of stadiums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Stadium'
    post:
      summary: Add a new stadium
      operationId: addStadium
      tags: [Stadiums]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Stadium'
      responses:
        '201':
          description: Stadium created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stadium'
components:
  schemas:
    Stadium:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        city:
          type: string
        team:
          type: string
        capacity:
          type: integer
        latitude:
          type: number
          format: double
          description: Latitude in decimal degrees
        longitude:
            type: number
            format: double
            description: Longitude in decimal degrees
        shortCode:
          type: string